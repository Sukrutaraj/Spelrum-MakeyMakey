<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spelrummet – MakeyMakey</title>
<style>
/* fonts: system fallbacks — works 100% offline */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#0a140a;color:#f0f0f0;}
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 25% 45%,#0a1f0a 0%,#0a140a 65%);}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.11;animation:orbf linear infinite alternate;}
@keyframes orbf{from{transform:translate(0,0);}to{transform:translate(35px,-25px);}}
.view{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;}
.view.active{display:flex;}
.top-bar{flex-shrink:0;display:flex;align-items:center;padding:clamp(8px,1.5vh,16px) clamp(12px,2vw,24px);gap:12px;background:rgba(0,0,0,0.35);border-bottom:1px solid rgba(255,255,255,0.06);}
.back-btn{font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;font-size:15px;border:none;border-radius:8px;background:rgba(255,255,255,0.09);color:#e0e0f0;padding:7px 16px;cursor:pointer;transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.back-btn:hover{background:rgba(255,255,255,0.18);}
.home-btn{font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;font-size:15px;border:none;border-radius:8px;background:rgba(34,197,94,0.15);color:#22c55e;padding:7px 16px;cursor:pointer;transition:background .15s;white-space:nowrap;text-decoration:none;display:flex;align-items:center;}
.home-btn:hover{background:rgba(34,197,94,0.25);}
.bar-title{font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;font-size:clamp(14px,2vw,20px);letter-spacing:2px;flex:1;}

/* Category view */
#viewCats .top-bar{border-bottom:none;background:transparent;}
.hub-header{text-align:center;padding:clamp(8px,1.5vh,18px) 16px clamp(4px,1vh,10px);flex-shrink:0;}
.hub-title{font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;font-size:clamp(22px,4vw,50px);letter-spacing:3px;background:linear-gradient(135deg,#22c55e,#86efac,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.hub-sub{font-size:clamp(10px,1.2vw,13px);letter-spacing:3px;text-transform:uppercase;color:#1a3a1a;margin-top:3px;}

/* MakeyMakey key display */
.key-display{
  display:flex;justify-content:center;align-items:center;gap:6px;
  flex-shrink:0;padding:8px 0 4px;flex-wrap:wrap;
}
.key{
  background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);
  border-radius:8px;padding:4px 10px;font-size:clamp(12px,1.8vw,16px);
  font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;letter-spacing:1px;color:#22c55e;
}

.cat-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,1.8vh,18px);padding:clamp(10px,1.5vh,20px) clamp(16px,4vw,40px);-webkit-overflow-scrolling:touch;}
.cat-btn{width:100%;max-width:500px;display:flex;align-items:center;gap:clamp(14px,2.5vw,24px);padding:clamp(14px,2.2vh,24px) clamp(18px,3vw,32px);border-radius:20px;cursor:pointer;border:2px solid transparent;transition:transform .16s,box-shadow .16s;-webkit-tap-highlight-color:transparent;user-select:none;}
.cat-btn:hover,.cat-btn:active{transform:scale(1.03) translateY(-2px);box-shadow:0 10px 35px rgba(0,0,0,0.5);}
.cat-btn-icon{font-size:clamp(30px,5vw,52px);line-height:1;flex-shrink:0;}
.cat-btn-name{font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;font-size:clamp(18px,2.8vw,30px);letter-spacing:2px;}
.cat-btn-count{font-size:clamp(11px,1.4vw,14px);opacity:0.65;margin-top:2px;}

/* Game grid */
.games-scroll{flex:1;overflow-y:auto;padding:clamp(12px,2vh,22px) clamp(12px,2vw,28px);-webkit-overflow-scrolling:touch;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(130px,16vw,200px),1fr));gap:clamp(10px,1.8vw,18px);}
.game-card{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:clamp(12px,2vh,20px) 10px;cursor:pointer;text-align:center;transition:transform .15s,background .15s,box-shadow .15s;display:flex;flex-direction:column;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;user-select:none;position:relative;}
.game-card:hover,.game-card:active{transform:scale(1.05) translateY(-3px);background:rgba(255,255,255,0.1);box-shadow:0 8px 28px rgba(0,0,0,0.5);}
.card-emoji{font-size:clamp(28px,4.5vw,52px);line-height:1;transition:transform .2s;}
.game-card:hover .card-emoji{transform:scale(1.18) rotate(-4deg);}
.card-name{font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;font-size:clamp(12px,1.6vw,16px);letter-spacing:1px;}
.card-desc{font-size:clamp(9px,1vw,11px);color:#2a5a2a;line-height:1.3;}
.card-new{position:absolute;top:5px;right:5px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:7px;letter-spacing:1px;}
.add-card{border-style:dashed;border-color:rgba(34,197,94,0.2);opacity:0.45;cursor:default;}

/* How-to box */
.howto{
  background:rgba(34,197,94,0.06);
  border:1px solid rgba(34,197,94,0.2);
  border-radius:14px;padding:16px 20px;
  max-width:480px;width:90%;
  font-size:clamp(12px,1.6vw,14px);
  color:#4a8a4a;line-height:1.8;
  text-align:center;
}
.howto strong{color:#22c55e;font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;letter-spacing:1px;}

/* Game frame */
#viewGame .top-bar{background:rgba(0,0,0,0.92);}
#gameFrame{flex:1;border:none;width:100%;background:#000;}

/* TOUCH CONTROLS */
#touchToggle{
  position:fixed;
  bottom:16px;
  right:16px;
  z-index:9999;
  border:none;
  border-radius:14px;
  padding:12px 18px;
  font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;
  font-size:16px;
  background:rgba(34,197,94,0.18);
  border:1px solid rgba(34,197,94,0.35);
  color:#86efac;
  cursor:pointer;
  backdrop-filter:blur(8px);
  box-shadow:0 6px 24px rgba(0,0,0,0.4);
}

/* touch controls → see improved-touch-style block below */

</style>

<style id="improved-touch-style">
#touchControls{
  position:fixed !important;
  left:40px;
  top:40px;
  right:auto !important;
  bottom:auto !important;
  z-index:99999;
  display:none;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:24px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  will-change:transform;
}

#touchDragHandle{
  width:100%;
  padding:10px 14px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  color:#86efac;
  font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;
  font-size:14px;
  text-align:center;
  cursor:grab;
  touch-action:none;
}

.touch-row{
  display:flex;
  gap:10px;
}

.touch-btn{
  width:82px;
  height:82px;
  border:none;
  border-radius:22px;
  font-size:34px;
  font-family:'Trebuchet MS','Arial Rounded MT Bold',system-ui,sans-serif;
  background:rgba(20,20,20,0.92);
  color:#86efac;
  border:2px solid rgba(34,197,94,0.4);
  box-shadow:0 0 18px rgba(34,197,94,0.22);
  touch-action:manipulation;
}

.touch-btn:active{
  transform:scale(0.94);
}

.space-btn{
  width:174px;
  font-size:18px;
}
</style>

</head>

<div id="bg">
  <div class="orb" style="width:600px;height:600px;background:#059669;top:-150px;left:-150px;animation-duration:17s;"></div>
  <div class="orb" style="width:500px;height:500px;background:#0d9488;bottom:-100px;right:-100px;animation-duration:21s;animation-delay:-9s;"></div>
  <div class="orb" style="width:350px;height:350px;background:#1d4ed8;top:38%;left:38%;animation-duration:14s;animation-delay:-5s;"></div>
</div>

<!-- ══ VIEW 1: CATEGORIES ══ -->
<div class="view active" id="viewCats">
  <div class="top-bar" style="justify-content:space-between;">
    <a class="home-btn" href="spelrummet_start.html">🏠 Startsidan</a>
    <div style="text-align:right;">
      <div class="hub-title" style="font-size:clamp(16px,2.5vw,28px);">🕹️ MAKEY MAKEY</div>
    </div>
  </div>
  <div class="key-display">
    <span class="key">↑ Upp</span>
    <span class="key">↓ Ned</span>
    <span class="key">← Vänster</span>
    <span class="key">→ Höger</span>
    <span class="key">⎵ Mellanslag</span>
    <span class="key">↵ Enter</span>
  </div>
  <div class="cat-scroll" id="catList"></div>
</div>

<!-- ══ VIEW 2: GAME GRID ══ -->
<div class="view" id="viewGames">
  <div class="top-bar">
    <button class="back-btn" onclick="showCats()">← Kategorier</button>
    <span class="bar-title" id="gamesBarTitle"></span>
    <a class="home-btn" href="spelrummet_start.html">🏠</a>
  </div>
  <div class="games-scroll"><div class="cards-grid" id="gameList"></div></div>
</div>

<!-- ══ VIEW 3: GAME FRAME ══ -->
<div class="view" id="viewGame">
  <div class="top-bar">
    <button class="back-btn" onclick="closeGame()">← Meny</button>
    <span class="bar-title" id="gameBarTitle"></span>
    <a class="home-btn" href="spelrummet_start.html">🏠</a>
  </div>
  <iframe id="gameFrame" allowfullscreen></iframe>
</div>

const GAMES = [
  {id:"snake",name:"Snake",emoji:"🐍",desc:"Styr ormen med ↑↓←→",category:"pilar"},
  {id:"labyrint",name:"Labyrint",emoji:"🗺️",desc:"3 banor — klicka eller tryck 1/2/3",category:"pilar"},
  {id:"racer",name:"Racerbana",emoji:"🏎️",desc:"Top-view bil — styr med ←→",category:"pilar"},
  {id:"shooter",name:"Rymdskjutaren",emoji:"🚀",desc:"← → rotera · ↑/SPACE skjuta",category:"pilar"},
  {id:"reaktion",name:"Reaktionsspel",emoji:"⚡",desc:"Solo, Duell eller Riktning",category:"mellanslag"},
  {id:"collect",name:"Samla Stjärnor",emoji:"⭐",desc:"Samla ⭐ — bomber exploderar 💥",category:"action"},
  {id:"dodge",name:"Dodge",emoji:"🚗",desc:"Undvik hinder med ←→",category:"action"},
];

const CATEGORIES = [
  {id:'pilar',       name:'Piltangenter',    icon:'⬆️', color:'#22c55e',
   desc:'↑ ↓ ← → styr spelet',
   bg:'linear-gradient(135deg,#14532d,#15803d)'},
  {id:'mellanslag',  name:'Mellanslag & Enter', icon:'⎵', color:'#4ade80',
   desc:'Tryck för att agera',
   bg:'linear-gradient(135deg,#064e3b,#059669)'},
  {id:'action',      name:'Kombination',     icon:'🎮', color:'#34d399',
   desc:'Piltangenter + action-knappar',
   bg:'linear-gradient(135deg,#0f4c35,#10b981)'},
  {id:'deltagarspel',name:'Deltagarspel',    icon:'⭐', color:'#86efac',
   desc:'Spel byggda av deltagarna',
   bg:'linear-gradient(135deg,#0a2e1a,#16a34a)'},
];

let currentBlob = null;

function buildCats(){
  const list = document.getElementById('catList');
  list.innerHTML = '';

  CATEGORIES.forEach(cat=>{
    const games = GAMES.filter(g=>g.category===cat.id);
    if(games.length===0 && cat.id!=='deltagarspel') return;

    const btn = document.createElement('div');
    btn.className = 'cat-btn';
    btn.style.background = cat.bg;
    btn.style.borderColor = cat.color+'44';
    const count = games.length;
    btn.innerHTML =
      '<div class="cat-btn-icon">'+cat.icon+'</div>'+
      '<div>'+
        '<div class="cat-btn-name" style="color:'+cat.color+'">'+cat.name+'</div>'+
        '<div class="cat-btn-count">'+cat.desc+(count?' &nbsp;·&nbsp; '+count+' spel':' &nbsp;·&nbsp; Inga spel ännu')+'</div>'+
      '</div>';
    btn.addEventListener('click',()=>showGames(cat));
    btn.addEventListener('touchend',e=>{e.preventDefault();showGames(cat);});
    list.appendChild(btn);
  });

  // How-to box
  const how = document.createElement('div');
  how.className = 'howto';
  how.innerHTML =
    '<strong>Hur lägger man till spel?</strong><br>'+
    'Öppna filen i en textredigerare · Hitta <code style="background:rgba(34,197,94,0.1);padding:1px 6px;border-radius:4px;">const GAMES = [</code><br>'+
    'Lägg in spelets HTML som base64 i <code style="background:rgba(34,197,94,0.1);padding:1px 6px;border-radius:4px;">GAME_B64</code><br>'+
    'Lägg till ett objekt i <code style="background:rgba(34,197,94,0.1);padding:1px 6px;border-radius:4px;">GAMES</code> · Spara · Klart!';
  list.appendChild(how);
}

function showGames(cat){
  const games = GAMES.filter(g=>g.category===cat.id);
  const grid  = document.getElementById('gameList');
  grid.innerHTML = '';
  games.forEach(g=>{
    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.borderColor = cat.color+'30';
    card.innerHTML =
      (g.isNew?'<div class="card-new">NY!</div>':'')+
      '<div class="card-emoji">'+g.emoji+'</div>'+
      '<div class="card-name" style="color:'+cat.color+'">'+g.name+'</div>'+
      '<div class="card-desc">'+g.desc+'</div>';
    card.addEventListener('click',()=>openGame(g));
    card.addEventListener('touchend',e=>{e.preventDefault();openGame(g);});
    grid.appendChild(card);
  });
  // Always show add-placeholder
  const add = document.createElement('div');
  add.className = 'game-card add-card';
  add.innerHTML =
    '<div class="card-emoji">➕</div>'+
    '<div class="card-name" style="color:#22c55e;">Lägg till spel</div>'+
    '<div class="card-desc">Se instruktionerna i koden</div>';
  grid.appendChild(add);
  const title = document.getElementById('gamesBarTitle');
  title.textContent = cat.icon+' '+cat.name;
  title.style.color = cat.color;
  setView('viewGames');
}

function openGame(g){
  const b64 = GAME_B64[g.id] || g.b64;
  if(!b64){ alert('Spelet saknas! Kontrollera att b64-koden är tillagd.'); return; }
  const html = decodeURIComponent(escape(atob(b64)));
  if(currentBlob) URL.revokeObjectURL(currentBlob);
  const blob = new Blob([html],{type:'text/html;charset=utf-8'});
  currentBlob = URL.createObjectURL(blob);
  document.getElementById('gameBarTitle').textContent = g.emoji+' '+g.name;
  document.getElementById('gameFrame').src = currentBlob;
  setView('viewGame');
  // Show touch toggle button when in game view
  document.getElementById('touchToggle').style.display = 'block';
}

function closeGame(){
  document.getElementById('gameFrame').src='about:blank';
  if(currentBlob){URL.revokeObjectURL(currentBlob);currentBlob=null;}
  // Hide touch controls when leaving game
  const tc=document.getElementById('touchControls');
  const tt=document.getElementById('touchToggle');
  if(tc) tc.style.display='none';
  if(tt) tt.style.display='none';
  setView('viewGames');
}

function showCats(){ setView('viewCats'); }

function setView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));
}

buildCats();
</script>

<button id="touchToggle" style="display:none">🎮 Touch</button>

<div id="touchControls">
  <div id="touchDragHandle">✋ Flytta kontroller</div>
  <div class="touch-row">
    <button class="touch-btn" data-key="ArrowUp">↑</button>
  </div>

  <div class="touch-row">
    <button class="touch-btn" data-key="ArrowLeft">←</button>
    <button class="touch-btn" data-key="ArrowDown">↓</button>
    <button class="touch-btn" data-key="ArrowRight">→</button>
  </div>

  <div class="touch-row">
    <button class="touch-btn space-btn" data-key=" ">SPACE</button>
  </div>
</div>






<script>
(() => {

const touchToggle = document.getElementById("touchToggle");
const touchControls = document.getElementById("touchControls");
const dragHandle = document.getElementById("touchDragHandle");
const iframe = document.getElementById("gameFrame");

if(!touchToggle || !touchControls) return;

// ===== SHOW / HIDE =====

let controlsVisible = false;

touchToggle.addEventListener("click", () => {
  controlsVisible = !controlsVisible;
  touchControls.style.display = controlsVisible ? "flex" : "none";
});

// ===== STABLE KEY SYSTEM =====
// Main fix:
// Create NEW keyboard events every time.
// Previous version reused / routed events incorrectly
// and iframe focus eventually broke.

function fireKey(key){

  const eventData = {
    key: key,
    code: key === " " ? "Space" : key,
    bubbles: true,
    cancelable: true
  };

  // Main document
  document.dispatchEvent(
    new KeyboardEvent("keydown", eventData)
  );

  // iframe window + iframe document
  try{

    if(iframe && iframe.contentWindow){

      iframe.contentWindow.dispatchEvent(
        new KeyboardEvent("keydown", eventData)
      );

      if(iframe.contentWindow.document){

        iframe.contentWindow.document.dispatchEvent(
          new KeyboardEvent("keydown", eventData)
        );

      }
    }

  } catch(err){
    console.log("iframe dispatch issue", err);
  }
}

// ===== BUTTONS =====

document.querySelectorAll(".touch-btn").forEach(btn => {

  const key = btn.dataset.key;

  const press = (e) => {
    e.preventDefault();
    e.stopPropagation();

    btn.style.transform = "scale(0.92)";

    fireKey(key);

    setTimeout(() => {
      btn.style.transform = "";
    }, 120);
  };

  // pointerdown is most stable on Samsung Flip
  btn.addEventListener("pointerdown", press, {
    passive:false
  });

});

// ===== DRAG SYSTEM =====

let dragging = false;

let startX = 0;
let startY = 0;

let startLeft = 0;
let startTop = 0;

dragHandle.addEventListener("pointerdown", (e) => {

  e.preventDefault();
  e.stopPropagation();

  dragging = true;

  const rect = touchControls.getBoundingClientRect();

  startLeft = rect.left;
  startTop = rect.top;

  startX = e.clientX;
  startY = e.clientY;

  dragHandle.style.cursor = "grabbing";

}, { passive:false });

window.addEventListener("pointermove", (e) => {

  if(!dragging) return;

  e.preventDefault();

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  let newLeft = startLeft + dx;
  let newTop = startTop + dy;

  // keep onscreen
  newLeft = Math.max(
    0,
    Math.min(window.innerWidth - touchControls.offsetWidth, newLeft)
  );

  newTop = Math.max(
    0,
    Math.min(window.innerHeight - touchControls.offsetHeight, newTop)
  );

  touchControls.style.left = newLeft + "px";
  touchControls.style.top = newTop + "px";

}, { passive:false });

function stopDragging(){

  dragging = false;
  dragHandle.style.cursor = "grab";

}

window.addEventListener("pointerup", stopDragging);
window.addEventListener("pointercancel", stopDragging);

// ===== KEEP CONTROLS ABOVE IFRAME =====
// Important on touchscreens / fullscreen

touchControls.style.zIndex = "999999";
touchToggle.style.zIndex = "999999";

// ===== PREVENT TOUCH BROWSER GESTURES =====

touchControls.addEventListener("gesturestart", e => {
  e.preventDefault();
});

touchControls.addEventListener("touchstart", e => {
  e.stopPropagation();
}, { passive:false });

})();
</script>

</body>
</html>
